# SonarQube Project Configuration
# File: sonar-project.properties (place in project root)

sonar.projectKey=shopease
sonar.projectName=ShopEase E-Commerce
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Code coverage report (generated by JaCoCo during mvn test)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# SonarQube server
sonar.host.url=http://localhost:9000
# sonar.login=your-sonarqube-token-here

# Exclude generated code and config files
sonar.exclusions=**/target/**,**/*.xml,**/*.html,**/*.css,**/*.js

# Java version
sonar.java.source=17
sonar.java.target=17
