---
# ShopEase - Ansible Deployment Playbook
# Deploys Spring Boot WAR to Apache Tomcat on target Linux VM
# Run: ansible-playbook deploy.yml -i inventory/hosts.ini

- name: Deploy ShopEase E-Commerce Application
  hosts: webservers
  become: yes
  vars:
    app_name: shopease
    tomcat_home: /opt/tomcat
    war_dest: "{{ tomcat_home }}/webapps/{{ app_name }}.war"
    tomcat_service: tomcat

  tasks:

    # ── Pre-deployment checks ──────────────────────────────────────────────
    - name: Check if Tomcat is installed
      stat:
        path: "{{ tomcat_home }}"
      register: tomcat_dir

    - name: Fail if Tomcat not found
      fail:
        msg: "Tomcat not found at {{ tomcat_home }}. Run setup.yml first."
      when: not tomcat_dir.stat.exists

    # ── Stop Tomcat before deployment ──────────────────────────────────────
    - name: Stop Tomcat service
      service:
        name: "{{ tomcat_service }}"
        state: stopped
      ignore_errors: yes

    # ── Remove old deployment ──────────────────────────────────────────────
    - name: Remove old WAR file
      file:
        path: "{{ war_dest }}"
        state: absent

    - name: Remove old exploded WAR directory
      file:
        path: "{{ tomcat_home }}/webapps/{{ app_name }}"
        state: absent

    # ── Deploy new WAR ─────────────────────────────────────────────────────
    - name: Copy new WAR file to Tomcat webapps
      copy:
        src: "{{ war_file }}"
        dest: "{{ war_dest }}"
        owner: tomcat
        group: tomcat
        mode: '0644'

    - name: Verify WAR was copied
      stat:
        path: "{{ war_dest }}"
      register: war_copied

    - name: Show WAR file info
      debug:
        msg: "WAR deployed: {{ war_dest }} ({{ war_copied.stat.size }} bytes)"

    # ── Start Tomcat ───────────────────────────────────────────────────────
    - name: Start Tomcat service
      service:
        name: "{{ tomcat_service }}"
        state: started
        enabled: yes

    # ── Verify deployment ──────────────────────────────────────────────────
    - name: Wait for application to start (30 seconds)
      wait_for:
        host: localhost
        port: 8080
        delay: 10
        timeout: 60
        state: started

    - name: Health check - verify app is responding
      uri:
        url: "http://localhost:8080/{{ app_name }}/"
        method: GET
        status_code: 200
        timeout: 30
      register: health_check
      retries: 5
      delay: 10

    - name: Deployment complete!
      debug:
        msg: |
          ✅ ShopEase deployed successfully!
          🌐 URL: http://{{ ansible_host }}:8080/{{ app_name }}/
          📦 Version: {{ app_version | default('latest') }}
          ⏰ Time: {{ ansible_date_time.iso8601 }}
