# Ansible Inventory - Windows Server 2022 target
# ================================================
# Ansible connects to Windows via WinRM (not SSH)
# Run setup commands on Windows VM before using this

[windows]
winserver ansible_host=192.168.56.102

[windows:vars]
ansible_user=Administrator
ansible_password=YourWindowsPassword123      # Change this
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_winrm_port=5985
ansible_winrm_scheme=http
ansible_winrm_server_cert_validation=ignore
ansible_port=5985
