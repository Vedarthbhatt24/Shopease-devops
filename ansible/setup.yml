---
# ShopEase - Server Setup Playbook
# Installs Java 17, Apache Tomcat on target Linux VM
# Run ONCE before first deployment:
#   ansible-playbook setup.yml -i inventory/hosts.ini

- name: Setup ShopEase Server Environment
  hosts: webservers
  become: yes
  vars:
    java_version: "17"
    tomcat_version: "10.1.20"
    tomcat_home: /opt/tomcat
    tomcat_user: tomcat
    tomcat_group: tomcat

  tasks:

    # ── System Update ──────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Install Java 17 ────────────────────────────────────────────────────
    - name: Install OpenJDK 17
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Verify Java installation
      command: java -version
      register: java_ver
      changed_when: false

    - name: Show Java version
      debug:
        msg: "Java installed: {{ java_ver.stderr }}"

    # ── Create Tomcat user ─────────────────────────────────────────────────
    - name: Create tomcat group
      group:
        name: "{{ tomcat_group }}"
        state: present

    - name: Create tomcat user
      user:
        name: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        home: "{{ tomcat_home }}"
        shell: /bin/false
        system: yes

    # ── Download and install Tomcat ────────────────────────────────────────
    - name: Download Apache Tomcat {{ tomcat_version }}
      get_url:
        url: "https://archive.apache.org/dist/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: /tmp/tomcat.tar.gz
        mode: '0644'

    - name: Extract Tomcat
      unarchive:
        src: /tmp/tomcat.tar.gz
        dest: /opt/
        remote_src: yes
        creates: "/opt/apache-tomcat-{{ tomcat_version }}"

    - name: Create symlink /opt/tomcat -> tomcat directory
      file:
        src: "/opt/apache-tomcat-{{ tomcat_version }}"
        dest: "{{ tomcat_home }}"
        state: link

    - name: Set ownership of Tomcat directory
      file:
        path: "{{ tomcat_home }}"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        recurse: yes

    - name: Set execute permissions on Tomcat scripts
      file:
        path: "{{ tomcat_home }}/bin"
        mode: '0755'
        recurse: yes

    # ── Create systemd service ─────────────────────────────────────────────
    - name: Create Tomcat systemd service file
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat Web Application Server
          After=network.target

          [Service]
          Type=forking
          User={{ tomcat_user }}
          Group={{ tomcat_group }}
          Environment="JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"
          Environment="CATALINA_PID={{ tomcat_home }}/temp/tomcat.pid"
          Environment="CATALINA_HOME={{ tomcat_home }}"
          Environment="CATALINA_BASE={{ tomcat_home }}"
          ExecStart={{ tomcat_home }}/bin/startup.sh
          ExecStop={{ tomcat_home }}/bin/shutdown.sh
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start Tomcat
      service:
        name: tomcat
        state: started
        enabled: yes

    # ── Open firewall port ─────────────────────────────────────────────────
    - name: Allow port 8080 through UFW
      ufw:
        rule: allow
        port: '8080'
        proto: tcp
      ignore_errors: yes

    - name: Setup complete!
      debug:
        msg: |
          ✅ Server setup complete!
          ☕ Java 17 installed
          🐱 Tomcat {{ tomcat_version }} running on port 8080
          📁 Tomcat home: {{ tomcat_home }}
