<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
<meta charset="UTF-8"/><title>Admin Dashboard - ShopEase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--accent:#e85d26;--muted:#6b6b6b;--border:#e8e5de;--sidebar:#1a1a2e}
body{font-family:'DM Sans',sans-serif;background:#f4f5f7;color:var(--ink);display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--sidebar);color:#fff;padding:2rem 1.5rem;flex-shrink:0}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:2rem}
.sidebar-logo span{color:var(--accent)}
.sidebar-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#666;margin-bottom:.75rem;margin-top:1.5rem}
.sidebar a{display:flex;align-items:center;gap:.75rem;color:#ccc;text-decoration:none;padding:.6rem .75rem;border-radius:8px;font-size:.9rem;margin-bottom:.25rem;transition:all .2s}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.1);color:#fff}
.sidebar a.active{background:var(--accent);color:#fff}
.main{flex:1;padding:2rem}
.page-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:2rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2.5rem}
.stat-card{background:#fff;border-radius:12px;padding:1.5rem;border:1px solid var(--border)}
.stat-label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800}
.stat-value.accent{color:var(--accent)}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem}
.card-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.card-header a{font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--accent);text-decoration:none;font-weight:400}
table{width:100%;border-collapse:collapse}
th{padding:.75rem 1rem;text-align:left;font-size:.8rem;color:var(--muted);font-weight:500;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:.85rem 1rem;border-bottom:1px solid #f5f5f5;font-size:.9rem}
.badge{padding:.2rem .6rem;border-radius:100px;font-size:.75rem;font-weight:600}
.PENDING{background:#fff3cd;color:#856404}
.CONFIRMED{background:#cfe2ff;color:#084298}
.SHIPPED{background:#d1ecf1;color:#0c5460}
.DELIVERED{background:#d4edda;color:#155724}
.CANCELLED{background:#f8d7da;color:#721c24}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">Shop<span>Ease</span></div>
  <div class="sidebar-label">Main</div>
  <a href="/admin" class="active">📊 Dashboard</a>
  <a href="/admin/products">📦 Products</a>
  <a href="/admin/orders">📋 Orders</a>
  <div class="sidebar-label">Store</div>
  <a href="/" target="_blank">🛒 View Store</a>
  <a href="/logout">🚪 Logout</a>
</div>
<div class="main">
  <div class="page-title">Dashboard</div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Products</div>
      <div class="stat-value" th:text="${totalProducts}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" th:text="${totalOrders}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value accent">₹<span th:text="${#numbers.formatDecimal(totalRevenue,1,'COMMA',0,'POINT')}">0</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      Recent Orders
      <a href="/admin/orders">View all →</a>
    </div>
    <table>
      <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>
        <tr th:each="order : ${recentOrders}">
          <td><a th:href="@{/admin/orders/{id}(id=${order.id})}" style="color:#e85d26;text-decoration:none">#<span th:text="${order.id}"></span></a></td>
          <td th:text="${order.customerName}"></td>
          <td>₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',0,'POINT')}"></span></td>
          <td><span class="badge" th:classappend="${order.status.name()}" th:text="${order.status}"></span></td>
          <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}"></td>
        </tr>
        <tr th:if="${recentOrders.empty}"><td colspan="5" style="text-align:center;color:#aaa;padding:2rem">No orders yet</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
