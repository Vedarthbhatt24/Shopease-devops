<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><title>Product Form - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--accent:#e85d26;--muted:#6b6b6b;--border:#e8e5de;--sidebar:#1a1a2e}
body{font-family:'DM Sans',sans-serif;background:#f4f5f7;color:var(--ink);display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--sidebar);color:#fff;padding:2rem 1.5rem;flex-shrink:0}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:2rem}
.sidebar-logo span{color:var(--accent)}
.sidebar a{display:flex;align-items:center;gap:.75rem;color:#ccc;text-decoration:none;padding:.6rem .75rem;border-radius:8px;font-size:.9rem;margin-bottom:.25rem}
.sidebar a:hover{background:rgba(255,255,255,.1);color:#fff}
.main{flex:1;padding:2rem}
.page-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:2rem}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:2rem;max-width:600px}
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:.85rem;font-weight:500;color:#444;margin-bottom:.4rem}
input,select,textarea{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn{padding:.75rem 2rem;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;font-size:.95rem}
.btn:hover{background:var(--accent)}
.btn-outline{background:#fff;color:var(--ink);border:1.5px solid var(--border);margin-left:.75rem;text-decoration:none;display:inline-block;padding:.7rem 1.5rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:600;font-size:.95rem}
.error{color:#c00;font-size:.8rem;margin-top:.25rem}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">Shop<span>Ease</span></div>
  <a href="/admin">📊 Dashboard</a>
  <a href="/admin/products">📦 Products</a>
  <a href="/admin/orders">📋 Orders</a>
  <a href="/" target="_blank">🛒 View Store</a>
  <a href="/logout">🚪 Logout</a>
</div>
<div class="main">
  <div class="page-title" th:text="${product.id != null} ? 'Edit Product' : 'Add Product'">Product Form</div>
  <div class="card">
    <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
      <input type="hidden" th:field="*{id}"/>
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" th:field="*{name}" placeholder="e.g. Wireless Headphones"/>
        <div class="error" th:errors="*{name}"></div>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea th:field="*{description}" rows="3" placeholder="Product description..."></textarea>
        <div class="error" th:errors="*{description}"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" th:field="*{price}" step="0.01" min="0.01" placeholder="999.00"/>
          <div class="error" th:errors="*{price}"></div>
        </div>
        <div class="form-group">
          <label>Stock Quantity *</label>
          <input type="number" th:field="*{stock}" min="0" placeholder="50"/>
          <div class="error" th:errors="*{stock}"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select th:field="*{category}">
            <option value="">-- Select Category --</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Footwear">Footwear</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Bags">Bags</option>
            <option value="Sports">Sports</option>
            <option value="Stationery">Stationery</option>
            <option value="Other">Other</option>
          </select>
          <div class="error" th:errors="*{category}"></div>
        </div>
        <div class="form-group">
          <label>Active</label>
          <select th:field="*{active}">
            <option value="true">Yes - Visible in store</option>
            <option value="false">No - Hidden</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Image URL (optional)</label>
        <input type="text" th:field="*{imageUrl}" placeholder="https://..."/>
      </div>
      <div style="margin-top:1.5rem">
        <button type="submit" class="btn">Save Product</button>
        <a href="/admin/products" class="btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
