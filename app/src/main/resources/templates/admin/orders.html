<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><title>Orders - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--accent:#e85d26;--muted:#6b6b6b;--border:#e8e5de;--sidebar:#1a1a2e}
body{font-family:'DM Sans',sans-serif;background:#f4f5f7;display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--sidebar);color:#fff;padding:2rem 1.5rem;flex-shrink:0}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:2rem}
.sidebar-logo span{color:var(--accent)}
.sidebar a{display:flex;align-items:center;gap:.75rem;color:#ccc;text-decoration:none;padding:.6rem .75rem;border-radius:8px;font-size:.9rem;margin-bottom:.25rem}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.1);color:#fff}
.sidebar a.active{background:var(--accent);color:#fff}
.main{flex:1;padding:2rem}
.page-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:2rem}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:.75rem 1rem;text-align:left;font-size:.8rem;color:var(--muted);font-weight:500;text-transform:uppercase;border-bottom:1px solid var(--border);background:#fafafa}
td{padding:.85rem 1rem;border-bottom:1px solid #f5f5f5;font-size:.9rem}
.badge{padding:.25rem .6rem;border-radius:100px;font-size:.75rem;font-weight:600}
.PENDING{background:#fff3cd;color:#856404}
.CONFIRMED{background:#cfe2ff;color:#084298}
.SHIPPED{background:#d1ecf1;color:#0c5460}
.DELIVERED{background:#d4edda;color:#155724}
.CANCELLED{background:#f8d7da;color:#721c24}
.view-link{color:var(--accent);text-decoration:none;font-size:.85rem;font-weight:500}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">Shop<span>Ease</span></div>
  <a href="/admin">📊 Dashboard</a>
  <a href="/admin/products">📦 Products</a>
  <a href="/admin/orders" class="active">📋 Orders</a>
  <a href="/" target="_blank">🛒 View Store</a>
  <a href="/logout">🚪 Logout</a>
</div>
<div class="main">
  <div class="page-title">All Orders</div>
  <div class="card">
    <table>
      <thead><tr><th>Order ID</th><th>Customer</th><th>Email</th><th>Amount</th><th>Status</th><th>Date</th><th></th></tr></thead>
      <tbody>
        <tr th:each="order : ${orders}">
          <td><strong>#<span th:text="${order.id}"></span></strong></td>
          <td th:text="${order.customerName}"></td>
          <td th:text="${order.customerEmail}"></td>
          <td>₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',0,'POINT')}"></span></td>
          <td><span class="badge" th:classappend="${order.status.name()}" th:text="${order.status}"></span></td>
          <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}"></td>
          <td><a th:href="@{/admin/orders/{id}(id=${order.id})}" class="view-link">View →</a></td>
        </tr>
        <tr th:if="${orders.empty}"><td colspan="7" style="text-align:center;padding:2rem;color:#aaa">No orders yet</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
