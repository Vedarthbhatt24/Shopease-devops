<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><title th:text="${product.name} + ' - ShopEase'">Product - ShopEase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--accent:#e85d26;--muted:#6b6b6b;--border:#e8e5de}
body{font-family:'DM Sans',sans-serif;background:#fafaf7;color:var(--ink)}
nav{background:#fff;border-bottom:1px solid var(--border);padding:0 2rem}
.nav-inner{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--ink);text-decoration:none}
.logo span{color:var(--accent)}
.back{text-decoration:none;color:var(--muted);font-size:.9rem}
.section{max-width:900px;margin:3rem auto;padding:0 2rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.product-img img{width:100%;border-radius:16px;object-fit:cover;aspect-ratio:1}
.cat{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:1rem;line-height:1.2}
.price{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--accent);margin-bottom:1.5rem}
.desc{color:var(--muted);line-height:1.7;margin-bottom:2rem}
.stock{font-size:.9rem;color:#155724;background:#d4edda;padding:.4rem .8rem;border-radius:100px;display:inline-block;margin-bottom:1.5rem}
.stock.low{background:#fff3cd;color:#856404}
.stock.out{background:#f8d7da;color:#721c24}
.qty-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.qty-row label{font-weight:500;font-size:.9rem}
.qty-row input{width:80px;padding:.5rem;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-size:1rem}
.btn{width:100%;padding:1rem;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer}
.btn:hover{background:var(--accent)}
@media(max-width:700px){.section{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">Shop<span>Ease</span></a>
    <a href="/" class="back">← Back to store</a>
  </div>
</nav>
<div class="section" th:if="${product != null}">
  <div class="product-img">
    <img th:src="${product.imageUrl}" th:alt="${product.name}" onerror="this.src='https://via.placeholder.com/500?text=Product'"/>
  </div>
  <div>
    <div class="cat" th:text="${product.category}"></div>
    <h1 th:text="${product.name}"></h1>
    <div class="price">₹<span th:text="${#numbers.formatDecimal(product.price,1,'COMMA',0,'POINT')}"></span></div>
    <p class="desc" th:text="${product.description}"></p>
    <span class="stock" th:if="${product.stock > 5}">✓ In Stock (<span th:text="${product.stock}"></span> available)</span>
    <span class="stock low" th:if="${product.stock > 0 and product.stock <= 5}">⚠ Only <span th:text="${product.stock}"></span> left!</span>
    <span class="stock out" th:if="${product.stock == 0}">✗ Out of Stock</span>
    <br/><br/>
    <form th:action="@{/cart/add}" method="post" th:if="${product.stock > 0}">
      <input type="hidden" name="productId" th:value="${product.id}"/>
      <div class="qty-row">
        <label>Quantity:</label>
        <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}"/>
      </div>
      <button type="submit" class="btn">Add to Cart 🛒</button>
    </form>
  </div>
</div>
</body>
</html>
