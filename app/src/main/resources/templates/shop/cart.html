<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cart - ShopEase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--paper:#fafaf7;--accent:#e85d26;--muted:#6b6b6b;--border:#e8e5de}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink)}
nav{background:#fff;border-bottom:1px solid var(--border);padding:0 2rem}
.nav-inner{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--ink);text-decoration:none}
.logo span{color:var(--accent)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.9rem}
.section{max-width:900px;margin:3rem auto;padding:0 2rem}
h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:2rem}
.cart-empty{text-align:center;padding:4rem;color:var(--muted)}
.cart-empty a{color:var(--accent)}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
th{background:var(--ink);color:#fff;padding:1rem;text-align:left;font-family:'Syne',sans-serif;font-size:.85rem}
td{padding:1rem;border-bottom:1px solid var(--border);vertical-align:middle}
td img{width:64px;height:64px;object-fit:cover;border-radius:8px}
.product-name{font-weight:500}
.price{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent)}
.remove-btn{background:none;border:1px solid #ddd;color:#e00;padding:.3rem .7rem;border-radius:4px;cursor:pointer;font-size:.8rem}
.remove-btn:hover{background:#fee}
.cart-total{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem 2rem;margin-top:1.5rem;display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:1rem;color:var(--muted)}
.total-amount{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--accent)}
.actions{display:flex;gap:1rem;justify-content:flex-end;margin-top:1.5rem}
.btn{padding:.75rem 2rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;text-decoration:none;border:none}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--accent)}
.btn-outline{background:#fff;color:var(--ink);border:1.5px solid var(--border)}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">Shop<span>Ease</span></a>
    <a href="/" class="nav-link">← Continue Shopping</a>
  </div>
</nav>
<div class="section">
  <h1>Your Cart</h1>
  <div th:if="${cartItems.empty}" class="cart-empty">
    <p style="font-size:3rem">🛒</p>
    <p style="margin-top:1rem">Your cart is empty. <a href="/">Start shopping!</a></p>
  </div>
  <div th:unless="${cartItems.empty}">
    <table>
      <thead>
        <tr>
          <th>Product</th><th>Name</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="item : ${cartItems}">
          <td><img th:src="${item.product.imageUrl}" th:alt="${item.product.name}" onerror="this.src='https://via.placeholder.com/64?text=IMG'"/></td>
          <td><div class="product-name" th:text="${item.product.name}"></div><div style="color:#888;font-size:.8rem" th:text="${item.product.category}"></div></td>
          <td class="price">₹<span th:text="${#numbers.formatDecimal(item.product.price,1,'COMMA',0,'POINT')}"></span></td>
          <td th:text="${item.quantity}"></td>
          <td class="price">₹<span th:text="${#numbers.formatDecimal(item.subtotal,1,'COMMA',0,'POINT')}"></span></td>
          <td>
            <form th:action="@{/cart/remove}" method="post">
              <input type="hidden" name="productId" th:value="${item.product.id}"/>
              <button type="submit" class="remove-btn">Remove</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="cart-total">
      <span class="total-label">Total Amount</span>
      <span class="total-amount">₹<span th:text="${#numbers.formatDecimal(total,1,'COMMA',0,'POINT')}"></span></span>
    </div>
    <div class="actions">
      <a href="/" class="btn btn-outline">← Continue Shopping</a>
      <a href="/checkout" class="btn btn-primary">Proceed to Checkout →</a>
    </div>
  </div>
</div>
</body>
</html>
