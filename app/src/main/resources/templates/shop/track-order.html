<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><title>Track Order - ShopEase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--accent:#e85d26;--muted:#6b6b6b;--border:#e8e5de}
body{font-family:'DM Sans',sans-serif;background:#fafaf7;color:var(--ink)}
nav{background:#fff;border-bottom:1px solid var(--border);padding:0 2rem}
.nav-inner{max-width:1200px;margin:auto;display:flex;align-items:center;height:64px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--ink);text-decoration:none}
.logo span{color:var(--accent)}
.section{max-width:700px;margin:3rem auto;padding:0 2rem}
h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:2rem}
.search-form{display:flex;gap:.75rem;margin-bottom:2rem}
.search-form input{flex:1;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem}
.search-form button{background:var(--ink);color:#fff;border:none;padding:.75rem 1.5rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer}
.order-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.order-id{font-family:'Syne',sans-serif;font-weight:700}
.badge{padding:.3rem .8rem;border-radius:100px;font-size:.78rem;font-weight:600}
.PENDING{background:#fff3cd;color:#856404}
.CONFIRMED{background:#cfe2ff;color:#084298}
.SHIPPED{background:#d1ecf1;color:#0c5460}
.DELIVERED{background:#d4edda;color:#155724}
.CANCELLED{background:#f8d7da;color:#721c24}
.order-meta{font-size:.85rem;color:var(--muted);margin-bottom:.5rem}
.order-total{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent);font-size:1.1rem}
</style>
</head>
<body>
<nav><div class="nav-inner"><a href="/" class="logo">Shop<span>Ease</span></a></div></nav>
<div class="section">
  <h1>Track Your Order</h1>
  <form class="search-form" th:action="@{/track-order}" method="get">
    <input type="email" name="email" th:value="${email}" placeholder="Enter your email address" required/>
    <button type="submit">Track</button>
  </form>
  <div th:if="${orders != null and orders.empty}">
    <p style="color:#888;text-align:center;padding:2rem">No orders found for this email.</p>
  </div>
  <div th:if="${orders != null and !orders.empty}">
    <div class="order-card" th:each="order : ${orders}">
      <div class="order-header">
        <span class="order-id">Order #<span th:text="${order.id}"></span></span>
        <span class="badge" th:classappend="${order.status.name()}" th:text="${order.status}"></span>
      </div>
      <div class="order-meta">Placed: <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span></div>
      <div class="order-meta">Ship to: <span th:text="${order.shippingAddress}"></span></div>
      <div class="order-total">₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',0,'POINT')}"></span></div>
    </div>
  </div>
</div>
</body>
</html>
